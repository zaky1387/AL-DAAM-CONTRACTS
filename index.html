v3.4  — زر حذف لجميع البنود الثابتة

v4.334 — إصلاح شامل لاستعادة العقد من السحابة
  • **المشكلة**: عند فتح عقد محفوظ، الحقول والمعاينة تظل تعرض بيانات العقد الذي كان قيد العمل
  • **السبب الجذري**: دالة loadContract كانت تضع القيم في الحقول فقط (el.value=...) دون:
    - تحديث عرض منتقي التاريخ الهجري/الميلادي (hijriDisplayText, gregDisplayText)
    - تحديث الحالة الداخلية للمنتقي (_dp.hijri, _dp.greg, _dp.issueHijri, _dp.issueGreg)
    - تحديث حقل hijriManualInput
    - استعادة نصوص البنود الثمانية المخزنة في _clause_pre, _clause_c1 ... _clause_c7
    - استدعاء initClauses قبل استعادة نصوص البنود
    - إعادة حساب المبالغ بالكلمات للدفعات (p1w, p2w, p3w)
  • **الحل**: إعادة كتابة loadContract بالكامل مع:
    - استعادة كاملة لحقول النموذج + الحالة الداخلية للتقاويم الأربعة
    - تحويل hM/mM (المخزنة كأسماء شهور نصية) إلى فهرس شهر لتحديث _dp
    - استعادة البنود النصية بعد initClauses مع تعيين data-edited=true
    - تشغيل updateLinkedClauses + calcVAT + onBudgetChange + onRepTitleChange
    - استدعاء نهائي بعد goStep(1) لضمان تحديث البنود المعتمدة على الحقول الأخرى
  • **النتيجة**: فتح أي عقد يُظهر جميع بياناته فوراً — تاريخاً، حقولاً، بنوداً، مرفقات

v4.333 — إصلاح فارق يومين في اختيار التاريخ الهجري
  • **المشكلة**: عند اختيار يوم 6 في التقويم الهجري، يتم تسجيل وعرض يوم 8 (فارق يومين ثابت)
  • **السبب الجذري**: حلقة تحويل ذهاب-وإياب في dpSelect
    - اختيار يوم هجري → hijriToGreg → استدعاء dpSelect('greg') متداخلاً
    - الاستدعاء المتداخل للميلادي كان يعيد تطبيق gregToHijri ويستبدل اليوم الأصلي
    - الدالتان الرياضيتان لا تعطيان round-trip مطابقاً (فارق ثابت يومين في بعض الشهور)
  • **الحل**: إضافة معامل `skipReverseSync` إلى dpSelect
    - عند استدعاء الميلادي من داخل دورة الهجري، يتم تخطي المزامنة العكسية
    - الاختيار الهجري للمستخدم يُحفظ كمصدر الحقيقة ولا يُعاد احتسابه
    - طُبّق الإصلاح على زوجي hijri/greg وissueHijri/issueGreg
  • تحديث حقل hijriManualInput عند تغيير المصدر من الميلادي أيضاً

v4.332 — استعادة النظام الأصلي مع تعزيز المعاينة
  • **النظام الأصلي مُستعاد بالكامل**:
    - `body > *:not(#printRoot) { display: none !important; }` — مُعاد
    - كل CSS الكليشة الفاخرة، background-image، هيدر/فوتر — يعمل كالأصل
  • **JavaScript محدود النطاق**:
    - يتدخل فقط عندما لا يوجد printRoot (المعاينة)
    - عندما يوجد printRoot — يُزيل نفسه تماماً ويترك النظام الأصلي
  • **ضمان الكليشة**:
    - هيدر في الصفحة الثانية والثالثة ✅
    - كليشة سفلية في كل صفحة ✅
    - خلفية مُتدرجة وألوان محفوظة ✅

v4.330 — حل مشكلة الصفحة البيضاء نهائياً
  • **المشكلة**: `body > *:not(#printRoot) { display: none }` تُخفي كل شيء عندما لا يوجد عقد
  • **الحل**: JavaScript + CSS استثناء للمعاينة
    - JavaScript يُضيف `body.no-print-content` عندما لا يوجد printRoot
    - CSS استثناء يُظهر `.doc` فقط مع إخفاء كل الـ UI
  • **النتيجة**:
    - العقد المُنشأ: كليشة فاخرة كاملة (النظام الأصلي)
    - المعاينة فقط: محتوى `.doc` نظيف للطباعة
  • **iPad مواءمة محفوظة**: responsive breakpoints + touch optimization

v4.329 — إصلاح نهائي: حذف كتلة print المتعارضة
  • **المشكلة المُكتشفة**: وجود كتلتين `@media print` — الثانية تُلغي الأولى
  • **الحل**: حذف الكتلة الثانية تماماً، ترك النظام الأصلي لوحده
  • **النتيجة**:
    - كتلة print واحدة فقط: `body > *:not(#printRoot) { display: none !important; }`
    - `paginateForPrint()` تعمل بدون تدخل
    - الكليشة الفاخرة، الهيدر، الفوتر مضمونة في كل صفحة
  • **iPad مواءمة محفوظة**: responsive breakpoints بدون تأثير على الطباعة

v4.328 — العودة للنظام الأصلي بالكامل + iPad CSS محسّن
  • **إزالة JavaScript بالكامل**: لا تدخل في منطق الطباعة الأصلي
  • **النظام الأصلي سليم 100%**:
    - `body > *:not(#printRoot) { display: none !important; }`
    - `paginateForPrint()` تعمل كما صممت أصلاً
    - الكليشة الفاخرة، الهيدر، الفوتر في كل صفحة — مضمونة
  • **iPad CSS fallback نظيف**: 
    - كتلة print ثانية تُطبق فقط عندما لا يوجد printRoot
    - لا تتدخل مع النظام الأصلي أبداً
    - Safari iPad color protection: `-webkit-print-color-adjust: exact`
  • **مواءمة iPad كاملة**: تخطيط متجاوب، touch targets، 100dvh
  • **Zero interference**: الطباعة العادية تعمل تماماً كما كانت

v4.327 — استعادة نظام الطباعة الأصلي + iPad fallback آمن
  • **إصلاح حرج**: استعادة `body > *:not(#printRoot) { display: none !important; }`
    - النظام الأصلي للطباعة مع الكليشة الفاخرة يعمل كما كان
    - الهيدر والفوتر وكليشة A4 تظهر في جميع الصفحات
  • **JavaScript محدود النطاق**: 
    - لا يتدخل إلا عندما لا يوجد محتوى عقد في `docBody`
    - يحترم `paginateForPrint()` و `printRoot` الأصلي تماماً
    - fallback فقط للمعاينة البسيطة (iPad Safari)
  • **Zero interference**: 
    - لا تأثير على الطباعة العادية مع العقد المُنشأ
    - الكليشة، الألوان، page-break كلها تعمل كالمعتاد

v4.326 — إصلاح JavaScript Console Error
  • حل خطأ MutationObserver: "parameter 1 is not of type 'Node'"
    - إضافة فحص وجود document.body قبل observer.observe()
    - setupObserver() مع retry logic للتعامل مع timing issues
    - Node.ELEMENT_NODE check لتجنب text nodes
    - cleanup عند beforeunload لمنع memory leaks
  • تعزيز safety checks:
    - فحص document.head قبل appendChild
    - timeout fallbacks لـ DOMContentLoaded
    - observer disconnect على إغلاق الصفحة

v4.325 — إصلاح الطباعة الشامل لـ Safari iPad
  • إعادة كتابة نظام الطباعة بالكامل بـ JavaScript ديناميكي:
    - منطق مزدوج: مع printRoot (العقد المُنشأ) وبدون printRoot (معاينة فقط)
    - حل مشاكل CSS `:has()` selector على Safari القديم
    - Event listeners لمراقبة إنشاء/حذف العقد وتحديث قواعد الطباعة فوراً
  • تعزيز Safari iPad الخاص:
    - `-webkit-print-color-adjust: exact` على كل العناصر لضمان طباعة الألوان
    - `page-break-inside: avoid` للبنود الحرجة (clause-block, doc-header, sig-block)
    - إزالة animations وtransitions في print mode لتجنب تعارض Safari
  • إخفاء UI عند الطباعة بدون العقد:
    - .topbar, .wizard-panel, .main-nav, .preview-topbar, .steps-nav — كلها مخفية
    - .preview-panel تُعرض بيضاء بدون shadow/border
    - .doc يُطبع مباشرة مع page-break protection
  • Backward compatibility: كل المكونات والثوابت بدون تغيير

v4.324 — مواءمة iPad واحترافية الطباعة (Cross-Device)
  • إضافة نقاط كسر متجاوبة للأجهزة اللوحية (iPad/iPad Pro):
    - 1180px: انتقال لوحة الصياغة لعرض 380px بدلاً من 440px
    - 1024px: تخطيط عمودي (وضع العرض) — النموذج أعلى، المعاينة أسفل
    - 820px: وضع iPad Portrait — تبويبات مضغوطة وأزرار بحجم اللمس
  • تعزيز أهداف اللمس (Touch Targets) ≥ 44×44px لكل:
    - تبويبات الخطوات، أزرار التنقل، حقول الإدخال، منتقي التاريخ
    - أزرار المعاينة والطباعة، تبويبات القائمة الرئيسية
  • تحسين iOS Safari:
    - ضبط `height: 100dvh` بدلاً من `100vh` لاحتساب الشريط السفلي
    - `-webkit-tap-highlight-color: transparent` لإزالة وميض اللمس
    - `touch-action: manipulation` للأزرار لمنع double-tap zoom
    - `font-size: 16px` للحقول لمنع zoom تلقائي عند الفوكس
  • تعزيز دعم الطباعة عبر Safari iPad:
    - `-webkit-print-color-adjust: exact` موحد لكل عناصر الطباعة
    - حماية من print-break داخل البنود الحرجة (toc, clauses)
    - ضبط `overflow: visible` صريح لـ Safari للطباعة
    - دمج قسمي الطباعة في كتلة موحدة ومنظمة
  • لا تغيير في البناء المنطقي أو المكونات:
    - Supabase sync، Hijri picker، city autocomplete، SHA-256 auth — كلها سليمة
    - localStorage keys وجميع الثوابت كما هي
    - جميع المكونات والوظائف تعمل بنفس السلوك على الديسك توب

/* ═══════════════════════════════════════════════
   ROOT VARIABLES & RESET
══════════════════════════════════════════════ */
:root {
  /* Brand colors (shared between themes) */
  --gold:      #b8922a;
  --gold-lt:   #d4a93c;
  --gold-glow: #e8c060;
  --gold-pale: #f4e4b0;
  --cream:     #faf6ec;
  --paper:     #fffdf7;
  --white:     #ffffff;
  --danger:    #c0392b;
  --success:   #1a6b3c;
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;

  /* Dark theme (default) */
  --ink:          #0c1220;
  --ink-mid:      #162035;
  --ink-soft:     #1e3050;
  --bg-gradient:  linear-gradient(145deg, #07101f 0%, #0f1e38 40%, #0a1628 70%, #060d1a 100%);
  --text-primary: #ffffff;
  --text-body:    #ffffff;
  --muted:        rgba(255,255,255,0.45);
  --border:       rgba(184,146,42,0.22);
  --card:         rgba(20,30,50,0.55);
  --card-solid:   #162035;
  --input-bg:     rgba(255,255,255,0.03);
  --modal-bg:     linear-gradient(135deg,#1a1a1a 0%,#242424 100%);
  --shadow-strong: 0 20px 60px rgba(0,0,0,0.6);
}

/* Light theme override */
html[data-theme="light"] {
  --ink:          #f5f1e6;
  --ink-mid:      #ebe4d0;
  --ink-soft:     #ddd2b3;
  --bg-gradient:  linear-gradient(145deg, #f8f4e8 0%, #efe8d4 40%, #f2ecd8 70%, #ede3c8 100%);
  --text-primary: #1a1a1a;
  --text-body:    #2a2a2a;
  --muted:        rgba(0,0,0,0.55);
  --border:       rgba(184,146,42,0.45);
  --card:         rgba(255,253,247,0.85);
  --card-solid:   #fffdf7;
  --input-bg:     rgba(255,255,255,0.6);
  --modal-bg:     linear-gradient(135deg,#fffdf7 0%,#f7efd9 100%);
  --shadow-strong: 0 20px 60px rgba(120,90,20,0.2);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Tajawal', sans-serif;
  background: var(--ink);
  color: var(--text-primary);
  direction: rtl;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%; /* منع تكبير نص iOS التلقائي في الوضع الأفقي */
  transition: background 0.3s ease, color 0.3s ease;
}

/* Light theme: targeted overrides for hardcoded whites/dark backgrounds */
html[data-theme="light"] .topbar-brand h1 { color: #2a2a2a; }
html[data-theme="light"] .fi, html[data-theme="light"] .fs, html[data-theme="light"] textarea {
  background: rgba(255,255,255,0.7) !important;
  color: #1a1a1a !important;
}
html[data-theme="light"] .fi::placeholder, html[data-theme="light"] textarea::placeholder {
  color: rgba(0,0,0,0.35) !important;
}
html[data-theme="light"] label, html[data-theme="light"] .field-label {
  color: #333 !important;
}
html[data-theme="light"] .step-label, html[data-theme="light"] .step-num {
  color: #2a2a2a;
}
html[data-theme="light"] .card { background: rgba(255,253,247,0.75); }
html[data-theme="light"] .wizard-panel, html[data-theme="light"] .doc-panel {
  background: var(--card); backdrop-filter: blur(10px);
}

html[data-theme="light"] .contract-doc { color: #000; }

/* Theme toggle button */
.theme-toggle {
  background: rgba(184,146,42,0.12);
  border: 1px solid var(--border);
  color: var(--gold-glow);
  border-radius: 8px;

  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  transition: all .2s;

  align-items: center;
  gap: 6px;
}
.theme-toggle:hover { background: rgba(184,146,42,0.22); border-color: var(--gold); }
html[data-theme="light"] .theme-toggle { color: #7a5a15; }

/* Logout button */
.logout-btn {
  background: rgba(220,70,70,0.1);
  border: 1px solid rgba(220,70,70,0.32);
  color: #e77;
  border-radius: 8px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  transition: all .2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.logout-btn:hover { background: rgba(220,70,70,0.18); border-color: rgba(220,70,70,0.5); color: #f88; }
html[data-theme="light"] .logout-btn { color: #a53030; background: rgba(200,60,60,0.08); }
html[data-theme="light"] .logout-btn:hover { background: rgba(200,60,60,0.18); color: #801f1f; }

/* ═══════════════════════════════════════════════
   ANIMATED BACKGROUND
══════════════════════════════════════════════ */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  background: var(--bg-gradient);
}
.bg-canvas::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 30%, rgba(184,146,42,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 70%, rgba(184,146,42,0.05) 0%, transparent 55%);
}
.bg-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(184,146,42,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(184,146,42,0.035) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridDrift 30s linear infinite;
}
@keyframes gridDrift {
  0%   { transform: translate(0,0); }
  100% { transform: translate(60px,60px); }
}
.bg-orb {
  position:absolute; border-radius:50%;
  filter: blur(80px); opacity: 0.12;
  animation: orbPulse 8s ease-in-out infinite alternate;
}
.orb1 { width:500px; height:500px; background:var(--gold); top:-100px; right:-150px; }
.orb2 { width:350px; height:350px; background:#2a4a8a; bottom:-80px; left:-100px; animation-delay:3s; }
@keyframes orbPulse {
  from { transform: scale(1) rotate(0deg); opacity:0.10; }
  to   { transform: scale(1.15) rotate(5deg); opacity:0.18; }
}

/* ═══════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════ */
.app {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh; /* iOS Safari: احتساب شريط المتصفح الديناميكي */
}

/* ═══ TOPBAR ═══ */
.topbar {
  display: flex; align-items: center; gap: 18px;
  padding: 0 36px;
  height: 70px;
  background: rgba(8,15,28,0.75);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-logo {
  height: 48px;
  background: white;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(184,146,42,0.25);
  flex-shrink: 0;
  padding: 4px 8px;
  overflow: hidden;
}
.topbar-logo img {
  height: 40px;
  width: auto;
  object-fit: contain;
  display: block;
}
.topbar-brand { flex:1; }

}

}
.topbar-pill {

  padding: 5px 13px; border-radius: 100px;

}
.topbar-saved-btn {
  background: rgba(184,146,42,0.15);

  color: var(--gold);

  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .2s;

}
.topbar-saved-btn:hover { background: rgba(184,146,42,0.28); border-color: var(--gold); }
